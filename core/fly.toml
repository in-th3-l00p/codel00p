# Fly.io config for the codel00p-cloud control-plane service.
# Build context is core/ (the Cargo workspace root); Fly uses core/Dockerfile.
app = "codel00p-cloud"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  grace_period = "15s"
  method = "GET"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
