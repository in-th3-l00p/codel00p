name: release

# Build the codel00p CLI for every supported platform and attach the binaries
# to a GitHub Release when a v* tag is pushed. Native runners are used for each
# target so the bundled C SQLite compiles without cross-toolchain setup.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build
        run: cargo build --release --bin codel00p --target ${{ matrix.target }}
        working-directory: core

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="core/target/${{ matrix.target }}/release/codel00p"
          archive="codel00p-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "$(dirname "$bin")" codel00p
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "core/target/${{ matrix.target }}/release/codel00p.exe"
          $archive = "codel00p-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower() + "  $archive" |
            Out-File -Encoding ascii "$archive.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codel00p-${{ matrix.target }}
          path: |
            codel00p-${{ matrix.target }}.*
          retention-days: 5

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
