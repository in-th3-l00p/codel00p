name: release

# Build the codel00p CLI and desktop app for every supported platform and attach
# the artifacts to a GitHub Release when a v* tag is pushed. Native runners are
# used where needed so bundled native dependencies build without cross-toolchain
# setup.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Run all JavaScript actions on Node 24 (Node 20 is being phased out).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build cli ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build
        # Stamp the binary with the release tag so `codel00p version` and the
        # self-updater report the version this artifact actually shipped as.
        run: cargo build --release --bin codel00p --target ${{ matrix.target }}
        working-directory: core
        env:
          CODEL00P_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="core/target/${{ matrix.target }}/release/codel00p"
          archive="codel00p-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "$(dirname "$bin")" codel00p
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "core/target/${{ matrix.target }}/release/codel00p.exe"
          $archive = "codel00p-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower() + "  $archive" |
            Out-File -Encoding ascii "$archive.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codel00p-${{ matrix.target }}
          path: |
            codel00p-${{ matrix.target }}.*
          retention-days: 5

  build-desktop:
    name: build desktop ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            electron_platform: mac
            electron_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            electron_platform: mac
            electron_arch: x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            electron_platform: linux
            electron_arch: x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            electron_platform: linux
            electron_arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            electron_platform: win
            electron_arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @codel00p/desktop build

      - name: Package desktop installer
        run: pnpm --filter @codel00p/desktop exec electron-builder --publish never --${{ matrix.electron_platform }} --${{ matrix.electron_arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Normalize artifacts
        shell: bash
        run: |
          node tools/scripts/desktop-release-assets.mjs normalize \
            --source apps/desktop/dist \
            --output desktop-dist \
            --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codel00p-desktop-${{ matrix.target }}
          path: desktop-dist/*
          retention-days: 5

  release:
    name: publish release
    needs:
      - build
      - build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
