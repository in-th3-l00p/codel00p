name: storage coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  storage-coverage:
    name: Storage coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check storage line coverage
        run: |
          cd core
          cargo llvm-cov -p codel00p-storage --features sqlite --summary-only --fail-under-lines 100
