        - article [ref=e60]:
          - generic [ref=e61]:
            - paragraph [ref=e62]: Architecture
            - heading "The harness" [level=1] [ref=e63]
            - paragraph [ref=e64]: codel00p-harness is the runtime. It owns the turn loop, tool execution, the workspace boundary, permissions, and the event stream.
          - heading "The turn loop" [level=2] [ref=e65]
          - paragraph [ref=e66]: "A turn is a bounded loop, not an open-ended process:"
          - list [ref=e67]:
            - listitem [ref=e68]: accept a user turn;
            - listitem [ref=e69]: build context from session state and workspace metadata;
            - listitem [ref=e70]: call the provider through the model client;
            - listitem [ref=e71]: execute the tools the model requested;
            - listitem [ref=e72]: append tool results to the session;
            - listitem [ref=e73]:
              - text: continue until a final assistant answer or the iteration limit set by
              - code [ref=e74]: "--max-iterations"
              - text: ;
            - listitem [ref=e75]: emit a typed event for every important step.
          - paragraph [ref=e76]: The result is a structured outcome the CLI, and later the desktop and cloud surfaces, can render or replay.
          - heading "Tools and the workspace boundary" [level=2] [ref=e77]
          - paragraph [ref=e78]:
            - text: Tools are grouped into sets you opt into with
            - code [ref=e79]: "--tool-set"
            - text: ":"
            - code [ref=e80]: read
            - text: for inspection,
            - code [ref=e81]: edit
            - text: for file changes,
            - code [ref=e82]: command
            - text: for running programs, and
            - code [ref=e83]: git
            - text: for repository state. Every tool is confined to the workspace root, so a run cannot read or write outside the project directory.
          - paragraph [ref=e84]:
            - text: Tools marked
            - strong [ref=e85]: concurrency-safe
            - text: can run together in one batch. Unsafe or unknown tools always run serially and split adjacent safe batches, and the harness preserves the model's original tool-call order when recording results and events.
          - heading "Permissions" [level=2] [ref=e86]
          - paragraph [ref=e87]:
            - text: Tool execution runs under a permission mode set with
            - code [ref=e88]: "--permission-mode"
            - text: ":"
          - list [ref=e89]:
            - listitem [ref=e90]:
              - code [ref=e91]: allow
              - text: — run permitted tools without prompting;
            - listitem [ref=e92]:
              - code [ref=e93]: ask
              - text: — confirm before sensitive actions, with the option to remember a decision;
            - listitem [ref=e94]:
              - code [ref=e95]: deny
              - text: — block the tool surface entirely.
          - paragraph [ref=e96]: The same checks cover external MCP tools, so connectors are governed the same way native tools are.
          - heading "Events and lifecycle hooks" [level=2] [ref=e97]
          - paragraph [ref=e98]:
            - text: Every step emits a typed event. With
            - code [ref=e99]: "--stream-events"
            - text: you see them live; with
            - code [ref=e100]: "--json-events"
            - text: you get them as serialized records after the answer. The same events drive session replay.
          - paragraph [ref=e101]: "The loop also exposes lifecycle hooks so memory, compaction, and approvals can extend a turn without forking it: queue recall before a turn, inject reviewed context before inference, observe tool evidence, extract facts before older transcript is compacted, and queue memory extraction once a turn completes."
